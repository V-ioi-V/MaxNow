<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaxNow Local Index</title>
    <meta name="description" content="Local entry points for MaxNow dash and blog." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --line: #dfe7f1;
        --text: #142033;
        --muted: #6c7a8c;
        --accent: #1d9bf0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Noto Sans SC", system-ui, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        background: var(--surface);
        box-shadow: 0 10px 26px rgba(27, 39, 62, 0.08);
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      a {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: #b8d8f5;
        color: var(--accent);
      }

      strong,
      small {
        display: block;
      }

      small {
        margin-top: 6px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .links {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MaxNow</h1>
      <p>本地开发入口。线上部署时，dash 和 blog 应分别指向自己的目录。</p>
      <div class="links">
        <a href="./dash/">
          <strong>Dash</strong>
          <small>dash.maxnow.cn</small>
        </a>
        <a href="./blog/">
          <strong>Blog</strong>
          <small>blog.maxnow.cn 首页预览</small>
        </a>
        <a href="./blog/topics.html">
          <strong>Blog Topics</strong>
          <small>博客专题页预览</small>
        </a>
        <a href="./blog/preview.html">
          <strong>Blog Plan</strong>
          <small>博客方案说明</small>
        </a>
      </div>
    </main>
  </body>
</html>
